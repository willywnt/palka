# Per-ENVIRONMENT app stack (single-host Option A): web (Next + Socket.IO) + BullMQ
# worker + Postgres + Redis + a one-shot migrate + a scheduled pg_dump backup.
#
# TLS + domain routing live in the SHARED Caddy (docker-compose.proxy.yml) so one box
# can host several environments. Bring the proxy up ONCE, then run THIS file once per
# environment from its OWN checkout dir (each dir holds its own .env.production):
#
#   docker network create edge                                    # once, ever
#   docker compose -f docker-compose.proxy.yml --env-file .env.proxy up -d
#   # in ~/apps/palka-prod    (its .env.production has WEB_ALIAS=palka-prod-web,    APP_IMAGE=falka-app:prod)
#   docker compose -p palka-prod    --env-file .env.production up -d --build
#   # in ~/apps/palka-staging (its .env.production has WEB_ALIAS=palka-staging-web, APP_IMAGE=falka-app:staging)
#   docker compose -p palka-staging --env-file .env.production up -d --build
#
# Uploaded files live on Cloudflare R2 (this host never stores them). The repo's
# docker-compose.yml is LOCAL DEV infra only — unrelated to this prod stack.
#
# NOTE: scaffold — validate/tune at the first real deploy. See docs/deployment/vps-setup.md.

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # NEXT_PUBLIC_* are inlined at BUILD time (per-env URL ⇒ per-env image, see APP_IMAGE).
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Falka}
      NEXT_PUBLIC_ENABLE_MOBILE_SCANNER: ${NEXT_PUBLIC_ENABLE_MOBILE_SCANNER:-true}
      DATABASE_URL: ${DATABASE_URL}
  image: ${APP_IMAGE:-falka-app:latest}
  env_file: [.env.production]
  restart: unless-stopped

services:
  # One-shot: apply Prisma migrations, then exit. web/worker wait for success.
  migrate:
    <<: *app
    restart: 'no'
    command: ['pnpm', '--filter', '@falka/db', 'db:migrate:deploy']
    depends_on:
      postgres: { condition: service_healthy }

  web:
    <<: *app
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose: ['3000']
    # Joins the shared `edge` network under a per-env alias so the shared Caddy can
    # route <domain> → this env's web. Postgres/Redis stay off `edge` (project-internal).
    networks:
      default: {}
      edge:
        aliases: ['${WEB_ALIAS:-palka-prod-web}']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  worker:
    <<: *app
    command: ['pnpm', '--filter', '@falka/worker', 'start']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:'+(process.env.WORKER_HEALTH_PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12

  # Scheduled pg_dump → local volume (gzip + retention). Sync the volume to R2 offsite
  # via host cron + rclone — see docs/deployment/vps-setup.md → "Backups".
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: [.env.production]
    volumes:
      - pg_backups:/backups
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: ['/bin/sh', '/backup-db.sh']
    depends_on:
      postgres: { condition: service_healthy }

networks:
  edge:
    external: true

volumes:
  pg_data:
  redis_data:
  pg_backups:
