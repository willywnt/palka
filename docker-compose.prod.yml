# Single-host PRODUCTION stack (Option A): Caddy (auto-TLS) → web (Next + Socket.IO),
# plus the BullMQ worker, Postgres, and Redis. Uploaded files live in R2 (Cloudflare),
# not on this host.
#
# The repo's docker-compose.yml is for LOCAL DEV infra only (postgres + redis). This
# prod stack is a separate file — always pass it explicitly with `-f`.
#
# Usage (one env file drives BOTH ${var} interpolation AND container env):
#   cp .env.production.vps.example .env.production    # then fill it in
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# NOTE: untested scaffold — validate/tune at first deploy. See docs/deployment/vps-setup.md.

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # NEXT_PUBLIC_* must be present at BUILD time (inlined into the client bundle).
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Falka}
      NEXT_PUBLIC_ENABLE_MOBILE_SCANNER: ${NEXT_PUBLIC_ENABLE_MOBILE_SCANNER:-true}
      DATABASE_URL: ${DATABASE_URL}
  image: falka-app:latest
  env_file: [.env.production]
  restart: unless-stopped

services:
  # One-shot: apply Prisma migrations, then exit. web/worker wait for success.
  migrate:
    <<: *app
    restart: 'no'
    command: ['pnpm', '--filter', '@falka/db', 'db:migrate:deploy']
    depends_on:
      postgres: { condition: service_healthy }

  web:
    <<: *app
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    expose: ['3000']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    # node (no curl/wget in the slim image) hits the platform health route; 503 when a
    # dependency is down. start_period covers Next.js boot so early failures don't count.
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  worker:
    <<: *app
    command: ['pnpm', '--filter', '@falka/worker', 'start']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:'+(process.env.WORKER_HEALTH_PORT||3001)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ['80:80', '443:443']
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  redis_data:
